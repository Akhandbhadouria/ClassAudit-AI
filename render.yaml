databases:
  - name: facere-db
    plan: free
    databaseName: facere_db
    user: facere_user

services:
  - type: web
    name: facere
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn facere.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: facere-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.10.12"
