services:
  - type: web
    name: facere-auth
    env: docker
    plan: free # Change this to starter/pro if your project requires more than 512MB RAM
    autoDeploy: false
    # By specifying `env: docker`, Render will automatically look for the 
    # Dockerfile in the root repository to build the image.
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: facere-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*" # Change this to your Render app URL in production

databases:
  - name: facere-db
    databaseName: facere
    user: facere_user
    plan: free # Render offers a limited free tier for PostgreSQL
