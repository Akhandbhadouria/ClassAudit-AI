databases:
  - name: facere-db
    plan: free
    databaseName: facere_db
    user: facere_user

services:
  - type: web
    name: facere
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: facere-db
          property: connectionString
